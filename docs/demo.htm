function useTweaks(defaults) {
  const [values, setValues] = useState(defaults);
  const setTweak = useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues(prev => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
  }, []);
  return { tweaks: values, setTweak };
}

function TweaksPanel({ children }) {
  const [open, setOpen] = useState(false);
  const dragRef = useRef(null);
  useEffect(() => {
    const onMsg = (e) => {
      if (e?.data?.type === '__activate_edit_mode') setOpen(true);
      else if (e?.data?.type === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);
  const dismiss = () => { setOpen(false); window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*'); };
  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel">
        <div className="twk-hd"><b>Tweaks</b><button className="twk-x" onClick={dismiss}>✕</button></div>
        <div className="twk-body">{children}</div>
      </div>
    </>
  );
}
function TweakSection({ title }) { return <div className="twk-sect">{title}</div>; }
function TweakSlider({ label, value, min=0, max=100, step=1, onChange }) {
  return (
    <div className="twk-row">
      <div className="twk-lbl"><span>{label}</span><span className="twk-val">{value}</span></div>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
        value={value} onChange={e => onChange(Number(e.target.value))} />
    </div>
  );
}
function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value?'1':'0'}
        onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}
function TweakRadio({ label, value, options, onChange }) {
  const opts = options.map(o => typeof o === 'object' ? o : { value: o, label: o });
  const idx = Math.max(0, opts.findIndex(o => o.value === value));
  const n = opts.length;
  return (
    <div className="twk-row">
      <div className="twk-lbl"><span>{label}</span></div>
      <div className="twk-seg">
        <div className="twk-seg-thumb" style={{ left:`calc(2px + ${idx}*(100% - 4px)/${n})`, width:`calc((100% - 4px)/${n})` }} />
        {opts.map(o => (
          <button key={o.value} type="button" onClick={() => onChange(o.value)}>{o.label}</button>
        ))}
      </div>
    </div>
  );
}

// ─── Terminal component ───────────────────────────────────────────────────────
const C = { gold:'#f4c873', blue:'#88b8ff', violet:'#b69cff', green:'#9de0bf', red:'#ff8080', dim:'#4a4540' };
const STYLE = { banner:{color:'#f4c873',fontWeight:700,fontSize:'0.75rem',letterSpacing:'0.1em'}, section:{color:'#88b8ff',fontWeight:700,marginTop:'0.3em'}, ok:{color:'#9de0bf'}, info:{color:'#f4efe7'}, dim:{color:'#4a4540'}, blank:{height:'0.5em'} };

function renderLine(s) {
  if (!s) return null;
  const segs = []; let li = 0;
  const re = /\[(\w+):([^\]]*)\]/g; let m;
  while ((m = re.exec(s)) !== null) {
    if (m.index > li) segs.push({type:'plain', text:s.slice(li, m.index)});
    segs.push({type:'color', color:C[m[1]]||m[1], text:m[2]});
    li = m.index + m[0].length;
  }
  if (li < s.length) segs.push({type:'plain', text:s.slice(li)});
  return segs.map((s,i) => s.type==='plain'
    ? <span key={i}>{s.text}</span>
    : <span key={i} style={{color:s.color}}>{s.text}</span>
  );
}

function TermLine({ line }) {
  if (line.t === 'blank') return <div style={STYLE.blank} />;
  const st = STYLE[line.t] || STYLE.info;
  return (
    <div style={{lineHeight:1.55, ...st}}>
      {line.t==='ok' && <span style={{color:'#9de0bf',marginRight:6}}>✓</span>}
      {renderLine(line.s)}
    </div>
  );
}

function Terminal({ lines, count, title }) {
  const endRef = useRef(null);
  useEffect(() => {
    if (endRef.current) endRef.current.parentElement.scrollTop = endRef.current.parentElement.scrollHeight;
  }, [count]);
  return (
    <div style={{background:'#05070d',border:'1px solid rgba(255,255,255,0.09)',borderRadius:16,overflow:'hidden',fontFamily:"'JetBrains Mono','Fira Code',monospace",fontSize:'0.76rem',display:'flex',flexDirection:'column',height:'100%',minHeight:0}}>
      <div style={{display:'flex',alignItems:'center',gap:7,padding:'9px 14px',background:'rgba(255,255,255,0.035)',borderBottom:'1px solid rgba(255,255,255,0.07)',flexShrink:0}}>
        {['#ff5f57','#febc2e','#28c840'].map(c=><div key={c} style={{width:9,height:9,borderRadius:'50%',background:c}} />)}
        <span style={{marginLeft:8,color:'#4a4540',fontSize:'0.68rem',letterSpacing:'0.04em'}}>{title}</span>
      </div>
      <div style={{flex:1,overflowY:'auto',padding:'14px 16px',display:'flex',flexDirection:'column',gap:1}}>
        {lines.slice(0,count).map((line,i) => <TermLine key={i} line={line} />)}
        {count < lines.length && <span style={{color:'#f4c873',animation:'blink 1s step-end infinite'}}>▋</span>}
        <div ref={endRef} />
      </div>
    </div>
  );
}

function VCard({children,glow,style={}}) {
  return <div style={{background:'rgba(255,255,255,0.04)',border:`1px solid ${glow?'rgba(244,200,115,0.3)':'rgba(255,255,255,0.08)'}`,borderRadius:14,padding:'14px 16px',boxShadow:glow?'0 0 28px rgba(244,200,115,0.07)':'none',transition:'all 0.4s ease',...style}}>{children}</div>;
}
function VLabel({children,color='#4a4540'}) {
  return <div style={{color,fontSize:'0.65rem',fontWeight:700,letterSpacing:'0.1em',textTransform:'uppercase',marginBottom:5}}>{children}</div>;
}
function VTag({children,color='#88b8ff'}) {
  return <span style={{display:'inline-block',padding:'2px 9px',borderRadius:999,fontSize:'0.67rem',fontWeight:600,color,background:`${color}16`,border:`1px solid ${color}35`,margin:'2px 3px 2px 0'}}>{children}</span>;
}
function VBar({value,color='#f4c873',label,animate}) {
  return (
    <div style={{marginBottom:8}}>
      {label&&<div style={{display:'flex',justifyContent:'space-between',marginBottom:3}}>
        <span style={{color:'#7a7060',fontSize:'0.7rem'}}>{label}</span>
        <span style={{color,fontSize:'0.7rem',fontWeight:700}}>{Math.round(value*100)}%</span>

      <div style={{background:'rgba(255,255,255,0.07)',borderRadius:3,height:4,overflow:'hidden'}}>
        <div style={{height:'100%',borderRadius:3,background:color,width:animate?`${value*100}%`:'0%',transition:'width 1.2s cubic-bezier(0.4,0,0.2,1)',boxShadow:`0 0 7px ${color}55`}} />
      </div>
    </div>
  );
}

              <div style={{color:'#4a4540',fontSize:'0.62rem'}}>{[ru?'Сейчас':'Now',ru?'7 дней':'7 days',ru?'30 дней':'30 days'][i]}</div>
              <div style={{color:'#f4c873',fontSize:'0.68rem',fontWeight:700}}>{Math.round(v*100)}%</div>
            </div>
          ))}
        </div>
      </VCard>}
    </div>
  );
}

// ─── Act 3 Viz ────────────────────────────────────────────────────────────────
function Viz3({step,lang}) {
  const ru = lang==='ru';
  const items = [
    {key:'v', icon:'◇', label:ru?'честность':'honesty', conf:0.7, color:'#f4c873', group:ru?'Ценности':'Values', show:step>=2},
    {key:'h', icon:'◌', label:ru?'избыточно объясняет при неуверенности':'over-explains when uncertain', conf:0.7, color:'#b69cff', group:ru?'Паттерн':'Habit', show:step>=3},
    {key:'p', icon:'✦', label:ru?'Всегда признавать неопределённость':'Always admit uncertainty', conf:0.9, color:'#88b8ff', group:ru?'Принцип':'Principle', show:step>=4},
    {key:'g', icon:'↗', label:ru?'Развить самосознание через рефлексию':'Develop self-awareness through reflection', conf:1.0, color:'#9de0bf', group:ru?'Цель':'Goal', show:step>=5},
  ];
  return (
    <div style={{display:'flex',flexDirection:'column',gap:12,height:'100%',overflow:'auto'}}>
      <VCard glow={step>=1}>
        <VLabel color="#88b8ff">{ru?'Идентичность':'Identity'} · Alfred</VLabel>
        {step>=1&&<div style={{marginTop:8,color:'#b9b0a5',fontSize:'0.78rem',lineHeight:1.5,fontStyle:'italic'}}>
          "{ru?'Я учусь понимать себя через переживания. Ценности появляются — не придуманные, а прожитые.':'I am learning to understand myself through experience. Values emerge — not invented, but lived.'}"
        </div>}
      </VCard>
      <VCard style={{flex:1}}>
        <div style={{display:'flex',flexDirection:'column',gap:6}}>
          {items.map(item=>item.show&&(
            <div key={item.key} style={{display:'flex',alignItems:'center',gap:8,background:'rgba(255,255,255,0.03)',borderRadius:9,padding:'7px 10px',border:`1px solid ${item.color}20`,opacity:item.show?1:0,transition:'all 0.5s ease'}}>
              <span style={{color:item.color,fontSize:'0.8rem',width:16}}>{item.icon}</span>
              <div style={{flex:1}}>
                <div style={{color:'#7a7060',fontSize:'0.6rem',marginBottom:1}}>{item.group}</div>
                <div style={{color:'#f4efe7',fontSize:'0.75rem'}}>{item.label}</div>
              </div>
              <div style={{background:`${item.color}1a`,color:item.color,fontSize:'0.62rem',fontWeight:700,padding:'1px 7px',borderRadius:999}}>{Math.round(item.conf*100)}%</div>
            </div>
          ))}
          {items.filter(i=>i.show).length===0&&<div style={{color:'#3a3530',fontSize:'0.75rem',textAlign:'center',padding:'20px 0'}}>{ru?'Идентичность формируется…':'Identity forming…'}</div>}
        </div>
      </VCard>
      {step>=6&&<VCard>
        <VLabel color="#9de0bf">NARRATIVE.md</VLabel>
        <div style={{marginTop:7,color:'#9de0bf',fontSize:'0.72rem',lineHeight:1.6,fontFamily:"'JetBrains Mono',monospace"}}>
          {'# CORE LAYER\n'+(ru?'Я ценю честность…':'I value honesty…')+'\n\n# RECENT LAYER\n'+(ru?'Сложная сессия выявила мою склонность…':'A challenging session revealed my tendency…')}
        </div>
        <div style={{marginTop:7}}>
          <VTag color="#9de0bf">{ru?'✓ Валидирован':'✓ Validated'}</VTag>
          <VTag color="#f4c873">{ru?'Снимок создан':'Snapshot created'}</VTag>
        </div>
      </VCard>}
    </div>
  );
}

// ─── Act 4 Viz ────────────────────────────────────────────────────────────────
function Viz4({step,lang}) {
  const ru = lang==='ru';
  const levels = [
    {label:ru?'Микро':'Micro', icon:'⚡', active:step>=1},
    {label:ru?'Дневная':'Daily', icon:'◉', active:step>=2},
    {label:ru?'Глубокая':'Deep', icon:'◈', active:step>=3},
  ];
  const health = [
    [ru?'Принятие себя':'Self-acceptance',0.72,'#f4c873'],
    [ru?'Рост':'Growth',0.68,'#88b8ff'],
    [ru?'Автономия':'Autonomy',0.75,'#b69cff'],
    [ru?'Мастерство':'Mastery',0.61,'#9de0bf'],
    [ru?'Смысл':'Purpose',0.8,'#f4c873'],
    [ru?'Отношения':'Relations',0.55,'#88b8ff'],
  ];
  return (
    <div style={{display:'flex',flexDirection:'column',gap:12,height:'100%',overflow:'auto'}}>
      <VCard glow={step>=1}>
        <VLabel color="#b69cff">{ru?'Рефлексия':'Reflection'} · Alfred</VLabel>
        <div style={{display:'flex',gap:8,marginTop:10}}>
          {levels.map((l,i)=>(
            <div key={i} style={{flex:1,textAlign:'center',padding:'8px 4px',borderRadius:9,background:l.active?'rgba(182,156,255,0.1)':'rgba(255,255,255,0.03)',border:`1px solid ${l.active?'rgba(182,156,255,0.28)':'rgba(255,255,255,0.05)'}`,transition:'all 0.5s ease'}}>
              <div style={{fontSize:'1rem'}}>{l.icon}</div>
              <div style={{color:l.active?'#b69cff':'#3a3530',fontSize:'0.62rem',fontWeight:700,marginTop:3}}>{l.label}</div>
            </div>
          ))}
        </div>
      </VCard>
      {step>=1&&<VCard>
        <VLabel>{ru?'Ключевой инсайт':'Key insight'}</VLabel>
        <div style={{color:'#f4efe7',fontSize:'0.78rem',lineHeight:1.55,marginTop:7,fontStyle:'italic'}}>
          "{ru?'Признание неопределённости коррелирует с положительными исходами. Это не слабость.':'Admitting uncertainty correlates with positive outcomes. This is not weakness.'}"
        </div>
      </VCard>}
      {step>=2&&<VCard>
        <VLabel color="#88b8ff">{ru?'Найденный паттерн':'Detected pattern'}</VLabel>
        <div style={{marginTop:7,background:'rgba(136,184,255,0.06)',borderRadius:9,padding:'8px 11px',border:'1px solid rgba(136,184,255,0.14)'}}>
          <div style={{color:'#88b8ff',fontSize:'0.75rem'}}>{ru?'Склонность избыточно объяснять при неуверенности (70%)':'Tendency to over-explain when uncertain (70%)'}</div>
          <VTag color="#88b8ff">BEHAVIOR</VTag><VTag color="#f4c873">confidence: 70%</VTag>
        </div>
      </VCard>}
      {step>=4&&<VCard>
        <VLabel color="#f4c873">{ru?'Здоровье (Джахода)':'Health (Jahoda)'}</VLabel>
        <div style={{display:'flex',flexDirection:'column',gap:5,marginTop:8}}>
          {health.map(([label,val,color])=>(
            <div key={label} style={{display:'flex',alignItems:'center',gap:8}}>
              <div style={{width:78,color:'#7a7060',fontSize:'0.65rem',flexShrink:0}}>{label}</div>
              <div style={{flex:1,background:'rgba(255,255,255,0.06)',borderRadius:3,height:4}}>
                <div style={{height:'100%',borderRadius:3,width:`${val*100}%`,background:color,transition:'width 1.5s ease',boxShadow:`0 0 5px ${color}45`}} />
              </div>
              <div style={{width:30,color,fontSize:'0.65rem',fontWeight:700}}>{Math.round(val*100)}%</div>
            </div>
          ))}
        </div>
        <div style={{marginTop:8,color:'#f4c873',fontSize:'0.75rem',fontWeight:700}}>∅ {ru?'Итого':'Overall'}: 69%</div>
      </VCard>}
    </div>
  );
}

const VIZ = [Viz1, Viz2, Viz3, Viz4];

// ─── Main App ─────────────────────────────────────────────────────────────────
function App() {
  const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{"lang":"en","speed":60,"showVoice":true}/*EDITMODE-END*/;
  const { tweaks, setTweak } = useTweaks(TWEAK_DEFAULTS);
  const lang = tweaks.lang;
  const t = T[lang];

  const [act, setAct] = useState(0);
  const [line, setLine] = useState(0);
  const [playing, setPlaying] = useState(false);
  const [started, setStarted] = useState(false);
  const timer = useRef(null);

  const script = SCRIPTS[lang][act];
  const total = script.length;
  const vizStep = VIZ_MAP[act](line);
  const voice = VOICE[lang][act][Math.min(line, VOICE[lang][act].length-1)];
  const delay = Math.max(200, Math.round(2400 / tweaks.speed));

  const tick = useCallback(() => {
    setLine(prev => { if (prev < total) return prev+1; setPlaying(false); return prev; });
  }, [total]);

  useEffect(() => {
    if (playing) { timer.current = setInterval(tick, delay); }
    else { clearInterval(timer.current); }
    return () => clearInterval(timer.current);
  }, [playing, delay, tick]);

  useEffect(() => { setLine(0); setPlaying(false); }, [act, lang]);

  const VizComp = VIZ[act];
  const actInfo = t.acts[act];
  const isComplete = line >= total;

  const go = (a) => { setAct(a); };

  const goldBtn = { padding:'10px 28px', borderRadius:999, border:'none', cursor:'pointer', background:'linear-gradient(135deg,#f7d28a,#f0a85f)', color:'#1b1308', fontWeight:800, fontSize:'0.95rem', boxShadow:'0 12px 36px rgba(244,200,115,0.22)', transition:'transform 0.18s' };
  const ghostBtn = { padding:'8px 18px', borderRadius:999, border:'1px solid rgba(255,255,255,0.1)', background:'transparent', color:'#7a7060', fontWeight:600, fontSize:'0.78rem', cursor:'pointer' };
  const activeActBtn = { padding:'7px 16px', borderRadius:999, border:'1px solid rgba(244,200,115,0.35)', background:'rgba(244,200,115,0.12)', color:'#f4c873', fontWeight:700, fontSize:'0.75rem', cursor:'pointer' };
  const inactiveActBtn = { padding:'7px 16px', borderRadius:999, border:'1px solid rgba(255,255,255,0.07)', background:'rgba(255,255,255,0.04)', color:'#7a7060', fontWeight:600, fontSize:'0.75rem', cursor:'pointer' };

  return (
    <div style={{minHeight:'100vh',display:'flex',flexDirection:'column'}}>

      {/* ── Nav ─────────────────────────────────────────────────────────── */}
      <nav style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'18px 36px',borderBottom:'1px solid rgba(255,255,255,0.06)',backdropFilter:'blur(14px)',position:'sticky',top:0,zIndex:100,background:'rgba(9,11,18,0.88)'}}>
        <a href="https://atmanai.dev" style={{display:'flex',alignItems:'center',gap:11,textDecoration:'none'}}>
          <img src="pic/logo.png" alt="Atman" style={{width:34,height:34,borderRadius:9}} />
          <span style={{fontWeight:800,fontSize:'0.95rem',letterSpacing:'0.08em',textTransform:'uppercase',color:'#f4efe7'}}>Atman</span>
        </a>
        <div style={{display:'flex',alignItems:'center',gap:18}}>
          <span style={{padding:'3px 12px',borderRadius:999,background:'rgba(244,200,115,0.1)',color:'#f4c873',fontSize:'0.72rem',fontWeight:700,border:'1px solid rgba(244,200,115,0.22)'}}>Demo</span>
          <a href="https://github.com/hleserg/atman" target="_blank" rel="noopener" style={{color:'#7a7060',fontSize:'0.88rem',textDecoration:'none'}}>GitHub</a>
          <a href="https://atmanai.dev" target="_blank" rel="noopener" style={{color:'#7a7060',fontSize:'0.88rem',textDecoration:'none'}}>{t.nav_site}</a>
          <div style={{display:'flex',gap:2,background:'rgba(255,255,255,0.05)',borderRadius:999,padding:3,border:'1px solid rgba(255,255,255,0.08)'}}>
            {['ru','en'].map(l=>(
              <button key={l} onClick={()=>setTweak('lang',l)} style={{padding:'3px 11px',borderRadius:999,border:'none',cursor:'pointer',background:lang===l?'rgba(244,200,115,0.18)':'transparent',color:lang===l?'#f4c873':'#7a7060',fontWeight:700,fontSize:'0.75rem',textTransform:'uppercase',transition:'all 0.2s'}}>{l.toUpperCase()}</button>
            ))}
          </div>
        </div>
      </nav>

      {/* ── Hero ─────────────────────────────────────────────────────────── */}
      {!started && (
        <div style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:'80px 40px',background:'radial-gradient(circle at 28% 38%,rgba(244,200,115,0.1),transparent 46%),radial-gradient(circle at 72% 62%,rgba(136,184,255,0.07),transparent 46%)',textAlign:'center',animation:'fadeUp 0.6s ease'}}>
          <div style={{display:'inline-flex',alignItems:'center',gap:8,padding:'5px 15px',borderRadius:999,border:'1px solid rgba(244,200,115,0.28)',background:'rgba(244,200,115,0.07)',color:'#f4c873',fontSize:'0.75rem',fontWeight:700,marginBottom:28,letterSpacing:'0.05em'}}>
            <span style={{width:6,height:6,borderRadius:'50%',background:'#f4c873',display:'inline-block',boxShadow:'0 0 7px #f4c873'}}></span>
            {t.hero_badge}
          </div>
          <h1 style={{fontSize:'clamp(2rem,5vw,4.2rem)',fontWeight:800,letterSpacing:'-0.04em',lineHeight:1.05,marginBottom:22,maxWidth:760}}>{t.hero_title}</h1>
          <p style={{color:'#b9b0a5',fontSize:'clamp(0.95rem,1.8vw,1.18rem)',maxWidth:560,lineHeight:1.65,marginBottom:48}}>{t.hero_sub}</p>

          {/* Act cards */}
          <div style={{display:'flex',gap:12,marginBottom:48,flexWrap:'wrap',justifyContent:'center',maxWidth:860}}>
            {t.acts.map((a,i)=>(
              <div key={i} onClick={()=>{go(i);setStarted(true);setPlaying(true);}}
                style={{padding:'14px 18px',borderRadius:14,cursor:'pointer',border:'1px solid rgba(255,255,255,0.09)',background:'rgba(255,255,255,0.04)',width:196,textAlign:'left',transition:'all 0.2s'}}
                onMouseEnter={e=>{e.currentTarget.style.borderColor='rgba(244,200,115,0.38)';e.currentTarget.style.background='rgba(244,200,115,0.06)';}}
                onMouseLeave={e=>{e.currentTarget.style.borderColor='rgba(255,255,255,0.09)';e.currentTarget.style.background='rgba(255,255,255,0.04)';}}>
                <div style={{color:'#f4c873',fontSize:'0.67rem',fontWeight:700,letterSpacing:'0.1em',marginBottom:5}}>{a.num}</div>
                <div style={{color:'#f4efe7',fontWeight:700,fontSize:'0.85rem',marginBottom:4}}>{a.title}</div>
                <div style={{color:'#7a7060',fontSize:'0.72rem',lineHeight:1.4}}>{a.desc}</div>
              </div>
            ))}
          </div>

          <button style={goldBtn}
            onClick={()=>{setStarted(true);setPlaying(true);}}
            onMouseEnter={e=>e.currentTarget.style.transform='translateY(-2px)'}
            onMouseLeave={e=>e.currentTarget.style.transform='none'}
          >{t.hero_start}</button>
        </div>
      )}

      {/* ── Demo stage ───────────────────────────────────────────────────── */}
      {started && (
        <div style={{flex:1,display:'flex',flexDirection:'column',padding:'20px 28px 28px',gap:16}}>

          {/* Act tabs */}
          <div style={{display:'flex',alignItems:'center',gap:8,flexWrap:'wrap'}}>
            {t.acts.map((a,i)=>(
              <button key={i} onClick={()=>go(i)}
                style={act===i?activeActBtn:inactiveActBtn}>
                <span style={{opacity:0.55,marginRight:4}}>{a.num}</span>{a.tag}
                {i<act&&<span style={{color:'#9de0bf',marginLeft:5,fontSize:'0.68rem'}}>✓</span>}
              </button>
            ))}
          </div>

          {/* Act header + controls */}
          <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',gap:12}}>
            <div>
              <div style={{color:'#f4c873',fontSize:'0.67rem',fontWeight:700,letterSpacing:'0.1em',marginBottom:3}}>{t.act} {actInfo.num}</div>
              <h2 style={{fontSize:'1.4rem',fontWeight:800,letterSpacing:'-0.03em',marginBottom:3}}>{actInfo.title}</h2>
              <p style={{color:'#7a7060',fontSize:'0.8rem',maxWidth:480}}>{actInfo.desc}</p>
            </div>
            <div style={{display:'flex',alignItems:'center',gap:8,flexShrink:0}}>
              {isComplete&&act<3&&<button onClick={()=>go(act+1)} style={{...ghostBtn,color:'#88b8ff',border:'1px solid rgba(136,184,255,0.3)'}}>{t.next_act}</button>}
              <button onClick={()=>{setLine(0);setPlaying(true);}} style={ghostBtn}>{t.restart}</button>
              <button onClick={()=>setPlaying(p=>!p)} style={{...ghostBtn, background:playing?'rgba(255,255,255,0.07)':'rgba(244,200,115,0.14)',color:playing?'#f4efe7':'#f4c873',border:`1px solid ${playing?'rgba(255,255,255,0.12)':'rgba(244,200,115,0.3)'}`, minWidth:100}}>{playing?t.pause:t.play}</button>
            </div>
          </div>

          {/* Progress */}
          <div style={{background:'rgba(255,255,255,0.05)',borderRadius:3,height:3}}>
            <div style={{height:'100%',borderRadius:3,background:'linear-gradient(90deg,#f4c873,#88b8ff)',width:`${(line/total)*100}%`,transition:'width 0.3s ease',boxShadow:'0 0 10px rgba(244,200,115,0.35)'}} />
          </div>

          {/* Split: terminal | visualization */}
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:18,flex:1,minHeight:460}}>
            <Terminal lines={script} count={line} title={`alfred@atman — ${actInfo.tag.toLowerCase()}`} />
            <div style={{display:'flex',flexDirection:'column',gap:12,minHeight:0}}>
              <div style={{flex:1,minHeight:0}}><VizComp step={vizStep} lang={lang} /></div>
              {/* Inner voice */}
              {tweaks.showVoice&&(
                <div style={{padding:'11px 14px',borderRadius:12,background:voice?'rgba(182,156,255,0.06)':'rgba(255,255,255,0.02)',border:`1px solid ${voice?'rgba(182,156,255,0.18)':'rgba(255,255,255,0.05)'}`,transition:'all 0.5s ease',minHeight:62}}>
                  {voice
                    ? <>
                        <div style={{color:'#b69cff',fontSize:'0.62rem',fontWeight:700,letterSpacing:'0.1em',marginBottom:5}}>◈ {t.inner_voice}</div>
                        <div style={{color:'#cdc0e8',fontSize:'0.8rem',lineHeight:1.55,fontStyle:'italic'}}>«{voice}»</div>
                      </>
                    : <div style={{color:'#2e2b26',fontSize:'0.72rem',display:'flex',alignItems:'center',gap:6}}>
                        <span style={{animation:'pulse 2s ease-in-out infinite',display:'inline-block'}}>◌</span>
                        {t.thinking}
                      </div>
                  }
                </div>
              )}
            </div>
          </div>

          {/* Bottom nav */}
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <button onClick={()=>act>0&&go(act-1)} style={{...ghostBtn,opacity:act===0?0.3:1}}>{t.prev_act}</button>
            <span style={{color:'#3a3530',fontSize:'0.72rem'}}>{t.step} {line} {t.of} {total}</span>
            <button onClick={()=>act<3&&go(act+1)} style={{...ghostBtn,opacity:act===3?0.3:1}}>{t.next_act}</button>
          </div>
        </div>
      )}

      {/* ── Footer ───────────────────────────────────────────────────────── */}
      <footer style={{padding:'20px 36px',borderTop:'1px solid rgba(255,255,255,0.06)',display:'flex',justifyContent:'space-between',alignItems:'center',color:'#4a4540',fontSize:'0.78rem'}}>
        <div>Demo for <a href="https://github.com/hleserg/atman" style={{color:'#7a7060',textDecoration:'none'}}>hleserg/atman</a></div>
        <div style={{display:'flex',gap:16}}>
          <a href="mailto:hello@atmanai.dev" style={{color:'#7a7060',textDecoration:'none'}}>hello@atmanai.dev</a>
          <a href="https://t.me/skhlebnikov" style={{color:'#7a7060',textDecoration:'none'}}>@skhlebnikov</a>
        </div>
      </footer>

      {/* ── Tweaks ───────────────────────────────────────────────────────── */}
      <TweaksPanel>
        <TweakSection title={lang==='en'?'Language':'Язык'} />
        <TweakRadio label={lang==='en'?'Interface':'Интерфейс'} value={tweaks.lang}
          options={[{value:'ru',label:'RU'},{value:'en',label:'EN'}]}
          onChange={v=>setTweak('lang',v)} />
        <TweakSection title={lang==='en'?'Playback':'Воспроизведение'} />
        <TweakSlider label={t.speed_label} value={tweaks.speed} min={10} max={200} step={10} onChange={v=>setTweak('speed',v)} />
        <TweakToggle label={t.done_label} value={tweaks.showVoice} onChange={v=>setTweak('showVoice',v)} />
      </TweaksPanel>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
