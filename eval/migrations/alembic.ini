# Alembic config for the eval schema only.
# Main app migrations have their own alembic.ini at repo root.
# Apply via: make eval-db-init

[alembic]
script_location = eval/migrations
prepend_sys_path = .
version_path_separator = os
# Distinct version table avoids collision with main migrations
# version_table is set in env.py to keep alembic.ini portable

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S

