name: 🤖 PR Checklist Bot

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: pr-checklist-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  models: read
  pull-requests: write
  contents: read

jobs:
  checklist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Build prompt and call GitHub Models
        env:
          GH_TOKEN: ${{ github.token }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          git diff origin/${{ github.base_ref }}...HEAD | head -c 8000 > diff.txt

          python3 - <<'EOF'
          import os, json, subprocess, textwrap

          title = os.environ.get("PR_TITLE", "")
          body  = os.environ.get("PR_BODY", "").strip() or "(empty)"
          with open("diff.txt", "rb") as f:
              # diff.txt is truncated with `head -c`; last UTF-8 sequence may be split
              diff = f.read().decode("utf-8", errors="replace")

          # Read .prompt.yml and substitute variables
          import re
          with open(".github/prompts/pr-checklist.prompt.yml") as f:
              raw = f.read()

          # Extract system and user messages
          sys_match  = re.search(r"- role: system\n\s+content: \|(.*?)(?=\n\s+- role:)", raw, re.DOTALL)
          user_match = re.search(r"- role: user\n\s+content: \|(.*?)(?=\ntestData:|\Z)", raw, re.DOTALL)

          system_prompt = textwrap.dedent(sys_match.group(1)).strip()
          user_template = textwrap.dedent(user_match.group(1)).strip()

          user_prompt = (user_template
              .replace("{{pr_title}}", title)
              .replace("{{pr_body}}", body)
              .replace("{{diff}}", diff))

          # Call GitHub Models via gh CLI
          result = subprocess.run(
              ["gh", "models", "run", "openai/gpt-4o-mini",
               "--system-prompt", system_prompt, user_prompt],
              capture_output=True, text=True
          )

          ai_text = result.stdout.strip() if result.returncode == 0 \
              else "⚠️ AI analysis unavailable — ensure GitHub Copilot is enabled for this repo."

          standard_url = (
              f"${{ github.server_url }}/${{ github.repository }}"
              f"/blob/${{ github.base_ref }}/docs/development/DEVELOPMENT_STANDARD.md"
          )

          lines = [
              "<!-- atman-pr-checklist -->",
              "## 🤖 PR Checklist — DEVELOPMENT_STANDARD §25",
              "",
              ai_text,
              "",
              "---",
              f"*Auto-generated · updates on each push · [standard §25]({standard_url})*",
          ]
          with open("comment.md", "w") as f:
              f.write("\n".join(lines))
          EOF

      - name: Find existing comment
        uses: peter-evans/find-comment@v4
        id: find
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: github-actions[bot]
          body-includes: "<!-- atman-pr-checklist -->"

      - name: Post or update comment
        uses: peter-evans/create-or-update-comment@v4
        with:
          comment-id: ${{ steps.find.outputs.comment-id }}
          issue-number: ${{ github.event.pull_request.number }}
          body-path: comment.md
          edit-mode: replace
