name: Deploy landing to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - index.html
      - document.html
      - CNAME
      - README.md
      - MANIFEST.md
      - docs/**
      - pic/**
      - .github/workflows/pages.yml
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Prepare Pages artifact
        run: |
          set -euo pipefail

          rm -rf /tmp/atman-pages
          mkdir -p /tmp/atman-pages/docs/architecture

          cp -R docs/site/. /tmp/atman-pages/
          cp docs/CNAME /tmp/atman-pages/CNAME
          cp README.md README.en.md MANIFEST.md MANIFEST.en.md /tmp/atman-pages/
          cp docs/architecture/SYSTEM.md docs/architecture/SYSTEM.en.md /tmp/atman-pages/docs/architecture/

      - name: Upload landing artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: /tmp/atman-pages

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
