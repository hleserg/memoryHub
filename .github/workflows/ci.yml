name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Lint, typecheck, security, tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 20

    strategy:
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install package with dev, e2e, and eval dependencies
        run: uv pip install --system -e ".[dev,e2e,eval]"

      - name: Run fast tests (quick feedback on PRs)
        if: github.event_name == 'pull_request'
        env:
          SKIP_EVAL_STORAGE_TEST: "1"
        run: pytest tests/ -m "not slow" -v

      - name: Run required checks (lint, typecheck, security, full test suite)
        if: matrix.python-version == '3.12'
        env:
          SKIP_EVAL_STORAGE_TEST: "1"
        run: make check

      - name: Run tests only (Python ${{ matrix.python-version }})
        if: matrix.python-version != '3.12'
        env:
          SKIP_EVAL_STORAGE_TEST: "1"
        run: pytest tests/ -v --cov=atman --cov-fail-under=89
